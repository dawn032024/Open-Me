<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Letter for Catrina</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@400;500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8f5f0;
            --envelope-color: #f0e6d8;
            --envelope-shadow: #d4c4b0;
            --accent-color: #8e7dbe;
            --text-dark: #3d3d3d;
            --paper-color: #fffbf7;
            --paper-shadow: rgba(0, 0, 0, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, var(--bg-color) 0%, #f5ede5 100%);
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .wrapper {
            position: relative;
            perspective: 1200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 450px;
        }

        /* ===== ENVELOPE STYLES ===== */
        .envelope-container {
            position: relative;
            width: 100%;
            height: 280px;
            perspective: 1200px;
            transition: all 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .envelope {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
        }

        /* Envelope Front (Base) */
        .envelope-front {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--envelope-color) 0%, #e8dcc8 100%);
            border: 2px solid var(--envelope-shadow);
            border-radius: 4px;
            box-shadow: 
                0 15px 35px rgba(0, 0, 0, 0.12),
                inset -1px -1px 3px rgba(0, 0, 0, 0.05);
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            transform-style: preserve-3d;
            transition: opacity 0.6s ease 0.2s;
        }

        .envelope-front.hide {
            opacity: 0;
            pointer-events: none;
        }

        /* Envelope Labels */
        .envelope-labels {
            position: absolute;
            left: 30px;
            top: 50%;
            transform: translateY(-50%);
            text-align: left;
            font-size: 0.85rem;
            color: #666;
            line-height: 1.8;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .envelope-labels.hide {
            opacity: 0;
        }

        .envelope-labels strong {
            color: var(--text-dark);
            font-weight: 500;
        }

        /* Envelope Back */
        .envelope-back {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #e8dcc8 0%, #e0d0bc 100%);
            border: 2px solid var(--envelope-shadow);
            border-radius: 4px;
            z-index: 2;
            transform: rotateY(0deg);
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        /* Envelope Flap (Top Triangle) */
        .envelope-flap {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            width: 0;
            height: 0;
            border-left: 225px solid transparent;
            border-right: 225px solid transparent;
            border-top: 140px solid var(--envelope-color);
            z-index: 3;
            transform-origin: top center;
            transform-style: preserve-3d;
            transition: transform 0.7s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            cursor: pointer;
            filter: drop-shadow(0 2px 5px rgba(0, 0, 0, 0.08));
        }

        .envelope-flap::before {
            content: '';
            position: absolute;
            top: -140px;
            left: -225px;
            width: 450px;
            height: 140px;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.03) 0%, transparent 100%);
        }

        /* Animation: Open Envelope */
        .wrapper.open .envelope-flap {
            transform: rotateX(-170deg);
        }

        .wrapper.open .envelope-back {
            transform: rotateY(100deg);
        }

        .wrapper.open .envelope-front {
            opacity: 0;
            pointer-events: none;
        }

        /* ===== LETTER STYLES ===== */
        .letter-container {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%) translateY(100%) rotateX(0deg);
            transform-style: preserve-3d;
            width: 85%;
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) 0.4s;
            z-index: 4;
        }

        .wrapper.open .letter-container {
            transform: translateX(-50%) translateY(-20px) rotateX(0deg);
            opacity: 1;
        }

        .letter {
            background: linear-gradient(135deg, var(--paper-color) 0%, #fffef9 100%);
            border: 1px solid #e8dcc8;
            border-radius: 3px;
            padding: 45px 35px;
            box-shadow: 
                0 20px 50px var(--paper-shadow),
                inset 0 1px 0 rgba(255, 255, 255, 0.6);
            position: relative;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .letter::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 2px,
                    rgba(142, 125, 190, 0.02) 2px,
                    rgba(142, 125, 190, 0.02) 4px
                );
            pointer-events: none;
            border-radius: 3px;
        }

        .letter-content {
            position: relative;
            z-index: 1;
        }

        /* Letter Title */
        .letter-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 700;
            font-style: italic;
            color: var(--accent-color);
            text-align: center;
            margin-bottom: 35px;
            letter-spacing: 2px;
        }

        /* Letter Main Text */
        .letter-text {
            font-family: 'Dancing Script', cursive;
            font-size: 1.25rem;
            font-weight: 400;
            line-height: 1.9;
            color: var(--text-dark);
            text-align: center;
            margin-bottom: 25px;
            letter-spacing: 0.3px;
        }

        .typing-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background-color: var(--accent-color);
            margin-left: 3px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

        /* Letter Signature/Footer */
        .letter-footer {
            font-family: 'Dancing Script', cursive;
            font-size: 1.3rem;
            font-weight: 500;
            color: var(--accent-color);
            text-align: center;
            margin-top: 30px;
            letter-spacing: 0.5px;
        }

        /* ===== BUTTONS ===== */
        .button-container {
            margin-top: 50px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 13px 35px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            letter-spacing: 1px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-transform: uppercase;
        }

        .btn-open {
            background: linear-gradient(135deg, var(--accent-color) 0%, #7a6ab1 100%);
            color: white;
            opacity: 1;
            transition: all 0.3s ease;
        }

        .btn-open:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(142, 125, 190, 0.4);
        }

        .btn-open:active {
            transform: translateY(-1px);
        }

        .btn-close {
            background: linear-gradient(135deg, #b8b8b8 0%, #a0a0a0 100%);
            color: white;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease 0.4s;
        }

        .wrapper.open .btn-open {
            opacity: 0;
            pointer-events: none;
        }

        .wrapper.open .btn-close {
            opacity: 1;
            pointer-events: all;
        }

        .btn-close:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        }

        .btn-close:active {
            transform: translateY(-1px);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .envelope-container {
                height: 220px;
            }

            .envelope-flap {
                border-left: 175px solid transparent;
                border-right: 175px solid transparent;
                border-top: 110px solid var(--envelope-color);
            }

            .envelope-flap::before {
                top: -110px;
                left: -175px;
                width: 350px;
                height: 110px;
            }

            .envelope-labels {
                font-size: 0.75rem;
                left: 20px;
                line-height: 1.6;
            }

            .letter {
                padding: 35px 25px;
                min-height: 350px;
            }

            .letter-title {
                font-size: 2rem;
                margin-bottom: 25px;
            }

            .letter-text {
                font-size: 1.1rem;
                line-height: 1.7;
            }

            .letter-footer {
                font-size: 1.1rem;
                margin-top: 20px;
            }

            .btn {
                padding: 11px 28px;
                font-size: 0.85rem;
            }
        }

        @media (max-width: 400px) {
            .envelope-container {
                height: 180px;
            }

            .envelope-flap {
                border-left: 150px solid transparent;
                border-right: 150px solid transparent;
                border-top: 90px solid var(--envelope-color);
            }

            .envelope-flap::before {
                top: -90px;
                left: -150px;
                width: 300px;
                height: 90px;
            }

            .letter {
                padding: 30px 20px;
                min-height: 320px;
            }

            .letter-title {
                font-size: 1.7rem;
                margin-bottom: 20px;
                letter-spacing: 1px;
            }

            .letter-text {
                font-size: 1rem;
                line-height: 1.6;
            }

            .letter-footer {
                font-size: 1rem;
            }

            .btn {
                padding: 10px 24px;
                font-size: 0.8rem;
                width: 100%;
            }

            .button-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <div class="wrapper" id="mainWrapper">
        <div class="envelope-container">
            <div class="envelope">
                <!-- Envelope Front -->
                <div class="envelope-front">
                    <div class="envelope-labels">
                        From: <strong>Natalie</strong><br>
                        To: <strong>Catrina</strong>
                    </div>
                </div>

                <!-- Envelope Back -->
                <div class="envelope-back"></div>

                <!-- Envelope Flap -->
                <div class="envelope-flap"></div>
            </div>
        </div>

        <!-- Letter Inside -->
        <div class="letter-container">
            <div class="letter">
                <div class="letter-content">
                    <h1 class="letter-title">I'm Sorry</h1>
                    <p class="letter-text">
                        <span id="typewriter"></span><span class="typing-cursor" id="cursor"></span>
                    </p>
                    <div class="letter-footer" id="signature"></div>
                </div>
            </div>
        </div>

        <!-- Buttons -->
        <div class="button-container">
            <button class="btn btn-open" onclick="openLetter()">Open the Letter ✉️</button>
            <button class="btn btn-close" onclick="closeLetter()">Close Letter</button>
        </div>
    </div>

    <script>
        const message = "I'm sorry, babe, for speaking out of anger. I deeply regret it. I hope you can forgive me, but even if you can't, I need you to know how truly sorry I am.";
        const signatureText = "Please, bati na tayo? 🥺";
        
        let typingStarted = false;
        let typingIndex = 0;
        let signatureTypingIndex = 0;
        let isTyping = false;

        function openLetter() {
            document.getElementById('mainWrapper').classList.add('open');
            if (!typingStarted) {
                setTimeout(() => {
                    typeWriter();
                }, 1200);
                typingStarted = true;
            }
        }

        function closeLetter() {
            document.getElementById('mainWrapper').classList.remove('open');
            
            // Reset typing
            typingStarted = false;
            typingIndex = 0;
            signatureTypingIndex = 0;
            isTyping = false;
            
            document.getElementById('typewriter').textContent = '';
            document.getElementById('signature').textContent = '';
        }

        function typeWriter() {
            if (isTyping) return;
            isTyping = true;

            const typewriterElement = document.getElementById('typewriter');
            const signatureElement = document.getElementById('signature');
            const cursorElement = document.getElementById('cursor');

            function type() {
                if (typingIndex < message.length) {
                    typewriterElement.textContent += message.charAt(typingIndex);
                    typingIndex++;
                    setTimeout(type, 50);
                } else {
                    // Start typing signature
                    typeSignature();
                }
            }

            function typeSignature() {
                if (signatureTypingIndex < signatureText.length) {
                    signatureElement.textContent += signatureText.charAt(signatureTypingIndex);
                    signatureTypingIndex++;
                    setTimeout(typeSignature, 50);
                } else {
                    cursorElement.style.display = 'none';
                    isTyping = false;
                }
            }

            type();
        }
    </script>

</body>
</html>
