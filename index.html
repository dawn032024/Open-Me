<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Letter for Catrina</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@500&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8f5f2;
            --env-front: #ffffff;
            --env-back: #f0ebe4;
            --env-flap: #e5dfd5;
            --accent: #9b89b3;
            --text: #4a4a4a;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        .container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ===== THE ENVELOPE ===== */
        .envelope {
            position: relative;
            width: 320px;
            height: 200px;
            background: var(--env-back);
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        /* The Flap */
        .flap {
            position: absolute;
            top: 0;
            width: 0;
            height: 0;
            border-top: 110px solid var(--env-flap);
            border-left: 160px solid transparent;
            border-right: 160px solid transparent;
            transform-origin: top;
            z-index: 4;
            transition: transform 0.5s ease, z-index 0.2s 0.3s;
        }

        /* The Front Cover (Pocket) */
        .pocket {
            position: absolute;
            bottom: 0;
            width: 0;
            height: 0;
            border-bottom: 110px solid var(--env-front);
            border-left: 160px solid #ece8e1;
            border-right: 160px solid #ece8e1;
            z-index: 3;
        }

        .pocket::after { /* Bottom triangle to close the shape */
            content: '';
            position: absolute;
            bottom: -110px;
            left: -160px;
            width: 320px;
            height: 110px;
            background: var(--env-front);
            z-index: 3;
        }

        /* Labels */
        .labels {
            position: absolute;
            top: 60px;
            left: 20px;
            z-index: 5;
            font-size: 0.8rem;
            color: #888;
            transition: opacity 0.3s;
        }

        .labels b { color: var(--text); font-weight: 500; }

        /* ===== THE LETTER ===== */
        .letter {
            position: absolute;
            bottom: 5px;
            left: 10px;
            width: 300px;
            height: 180px;
            background: white;
            z-index: 2; /* Hidden behind flap and pocket */
            padding: 30px 20px;
            box-sizing: border-box;
            transition: transform 0.6s 0.4s ease, height 0.6s 0.4s ease, z-index 0s 0.4s;
            text-align: center;
            box-shadow: 0 0 15px rgba(0,0,0,0.02);
        }

        /* ===== OPEN STATE ===== */
        .container.open .flap {
            transform: rotateX(180deg);
            z-index: 1; /* Move behind the letter after opening */
        }

        .container.open .letter {
            transform: translateY(-150px);
            height: 400px;
            z-index: 5; /* Pop to the very front */
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .container.open .labels {
            opacity: 0;
        }

        /* ===== CONTENT STYLES ===== */
        .letter h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--accent);
            margin-bottom: 15px;
            opacity: 0;
            transition: opacity 0.5s 1s;
        }

        .letter p {
            font-family: 'Dancing Script', cursive;
            font-size: 1.2rem;
            line-height: 1.6;
            color: var(--text);
        }

        .container.open .letter h1 { opacity: 1; }

        .btn-open {
            margin-top: 60px;
            padding: 12px 35px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            box-shadow: 0 5px 15px rgba(155, 137, 179, 0.3);
            transition: 0.3s;
        }

        .btn-open:hover { transform: translateY(-3px); background: #8a78a5; }
        
        .container.open .btn-open { display: none; }

    </style>
</head>
<body>

<div class="container" id="card">
    <div class="envelope">
        <div class="flap"></div>
        <div class="labels">
            From: <b>Natalie</b><br>
            To: <b>Catrina</b>
        </div>
        <div class="letter">
            <h1>I'm Sorry</h1>
            <p id="message"></p>
        </div>
        <div class="pocket"></div>
    </div>
    <button class="btn-open" onclick="openCard()">Open the letter ✉️</button>
</div>

<script>
    const text = "I'm sorry, babe, for speaking out of anger. I deeply regret it and I hope you can forgive me. I need you to know how truly sorry I am. Please, bati na tayo? 🥺";
    
    function openCard() {
        document.getElementById('card').classList.add('open');
        setTimeout(typeWriter, 1500);
    }

    let i = 0;
    function typeWriter() {
        if (i < text.length) {
            document.getElementById("message").innerHTML += text.charAt(i);
            i++;
            setTimeout(typeWriter, 40);
        }
    }
</script>

</body>
</html>
