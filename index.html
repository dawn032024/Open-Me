<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Letter for Catrina</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@400;500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8f5f0;
            --envelope-color: #ffffff;
            --envelope-border: #ebe3d5;
            --accent-color: #8e7dbe;
            --text-dark: #3d3d3d;
            --paper-color: #fffbf7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, var(--bg-color) 0%, #f5ede5 100%);
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 400px;
        }

        /* ===== ENVELOPE (RESIZED & ACCURATE) ===== */
        .envelope-wrapper {
            position: relative;
            width: 350px;
            height: 230px;
            background: var(--envelope-color);
            border: 1px solid var(--envelope-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            perspective: 1500px;
            transition: transform 0.8s ease;
        }

        /* Top Flap */
        .flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-top: 130px solid var(--envelope-border);
            border-left: 175px solid transparent;
            border-right: 175px solid transparent;
            transform-origin: top;
            z-index: 4;
            transition: transform 0.8s ease, z-index 0.2s 0.4s;
        }

        /* Front Pocket (The 'V' Shape) */
        .pocket {
            position: absolute;
            bottom: 0;
            width: 0;
            height: 0;
            border-bottom: 115px solid #ffffff;
            border-left: 175px solid #f9f6f1;
            border-right: 175px solid #f9f6f1;
            z-index: 3;
        }

        .envelope-labels {
            position: absolute;
            top: 50%;
            left: 25px;
            transform: translateY(-50%);
            z-index: 5;
            font-size: 0.85rem;
            color: #888;
            line-height: 1.8;
            transition: opacity 0.4s;
        }
        .envelope-labels strong { color: var(--text-dark); font-weight: 500; }

        /* ===== THE LETTER (SLIDE OUT) ===== */
        .letter {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            height: 80%;
            background: var(--paper-color);
            z-index: 2;
            padding: 40px 25px;
            box-sizing: border-box;
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1), height 1.2s ease, z-index 0s 0.6s;
            text-align: center;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border-radius: 2px;
        }

        /* ===== OPEN STATE ===== */
        .wrapper.open .flap {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .wrapper.open .letter {
            transform: translate(-50%, -220px); /* Slides out slowly */
            height: 480px;
            z-index: 10;
            box-shadow: 0 15px 45px rgba(0,0,0,0.1);
        }

        .wrapper.open .envelope-labels { opacity: 0; }

        /* ===== LETTER CONTENT ===== */
        .letter-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            font-style: italic;
            color: var(--accent-color);
            margin-bottom: 25px;
        }

        .letter-text {
            font-family: 'Dancing Script', cursive;
            font-size: 1.3rem;
            line-height: 1.6;
            color: var(--text-dark);
        }

        .letter-footer {
            font-family: 'Dancing Script', cursive;
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--accent-color);
            margin-top: 20px;
        }

        .typing-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background-color: var(--accent-color);
            margin-left: 3px;
            animation: blink 1s infinite;
        }
        @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }

        /* ===== BUTTONS (FIXED POSITIONING) ===== */
        .button-container {
            position: relative;
            margin-top: 50px;
            z-index: 100; /* Always on top */
        }

        .btn {
            padding: 13px 35px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 1px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-open {
            background: var(--accent-color);
            color: white;
            box-shadow: 0 4px 15px rgba(142, 125, 190, 0.3);
        }

        .btn-close {
            background: #b8b8b8;
            color: white;
            display: none;
        }

        .wrapper.open .btn-open { display: none; }
        .wrapper.open .btn-close { display: block; }
    </style>
</head>
<body>

    <div class="wrapper" id="mainWrapper">
        <div class="envelope-wrapper">
            <div class="flap"></div>
            
            <div class="envelope-labels">
                From: <strong>Natalie</strong><br>
                To: <strong>Catrina</strong>
            </div>

            <div class="letter">
                <h1 class="letter-title">I'm Sorry</h1>
                <p class="letter-text" id="typewriter"></p>
                <div class="letter-footer" id="signature"></div>
                <span class="typing-cursor" id="cursor"></span>
            </div>

            <div class="pocket"></div>
        </div>

        <div class="button-container">
            <button class="btn btn-open" onclick="openLetter()">Open the Letter ✉️</button>
            <button class="btn btn-close" onclick="closeLetter()">Close Letter</button>
        </div>
    </div>

    <script>
        const message = "I'm sorry, babe, for speaking out of anger. I deeply regret it. I hope you can forgive me, but even if you can't, I need you to know how truly sorry I am.";
        const signatureText = "Please, bati na tayo? 🥺";
        
        let typingIndex = 0;
        let sigIndex = 0;
        let isTyping = false;

        function openLetter() {
            document.getElementById('mainWrapper').classList.add('open');
            // Wait for the slide-out animation to be almost done before typing
            setTimeout(startTyping, 1000);
        }

        function closeLetter() {
            // Smooth reset by reloading or just removing class
            location.reload(); 
        }

        function startTyping() {
            if (isTyping) return;
            isTyping = true;
            typeMessage();
        }

        function typeMessage() {
            if (typingIndex < message.length) {
                document.getElementById('typewriter').textContent += message.charAt(typingIndex);
                typingIndex++;
                setTimeout(typeMessage, 45);
            } else {
                typeSignature();
            }
        }

        function typeSignature() {
            if (sigIndex < signatureText.length) {
                document.getElementById('signature').textContent += signatureText.charAt(sigIndex);
                sigIndex++;
                setTimeout(typeSignature, 50);
            } else {
                document.getElementById('cursor').style.display = 'none';
            }
        }
    </script>

</body>
</html>
