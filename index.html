<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Letter for Catrina</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Dancing+Script:wght@500;600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fcfaf7;
            --env-color: #ffffff;
            --env-border: #ebe3d5;
            --accent-purple: #9b89b3;
            --text-main: #444444;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            font-family: 'Poppins', sans-serif;
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            perspective: 1500px;
        }

        /* ===== CLASSIC ENVELOPE ✉️ ===== */
        .envelope {
            position: relative;
            width: 350px;
            height: 230px;
            background: var(--env-color);
            border: 1px solid var(--env-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: transform 0.6s;
        }

        /* The Flap */
        .flap {
            position: absolute;
            top: 0;
            width: 0;
            height: 0;
            border-top: 130px solid var(--env-border);
            border-left: 175px solid transparent;
            border-right: 175px solid transparent;
            transform-origin: top;
            z-index: 4;
            transition: transform 0.6s ease;
        }

        /* Front Face (Triangle folds like an icon) */
        .front-folds {
            position: absolute;
            bottom: 0;
            width: 0;
            height: 0;
            border-bottom: 115px solid #ffffff;
            border-left: 175px solid #f9f6f1;
            border-right: 175px solid #f9f6f1;
            z-index: 3;
        }

        .labels {
            position: absolute;
            top: 50%;
            left: 20px;
            transform: translateY(-50%);
            z-index: 5;
            font-size: 0.85rem;
            color: #888;
            line-height: 1.8;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .labels b { color: var(--text-main); font-weight: 500; }

        /* ===== THE LETTER ===== */
        .letter {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            height: 90%;
            background: white;
            z-index: 2;
            padding: 40px 25px;
            box-sizing: border-box;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Open State Styles */
        .wrapper.open .flap {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .wrapper.open .letter {
            height: 480px;
            transform: translate(-50%, -150px);
            z-index: 10;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .wrapper.open .labels { opacity: 0; }

        /* ===== CONTENT STYLES ===== */
        .letter-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--accent-purple);
            margin-bottom: 20px;
            font-weight: 700;
        }

        .letter-body {
            font-family: 'Dancing Script', cursive;
            font-size: 1.35rem;
            line-height: 1.6;
            color: var(--text-main);
        }

        .letter-sig {
            margin-top: 25px;
            font-family: 'Dancing Script', cursive;
            font-size: 1.4rem;
            color: var(--accent-purple);
            font-weight: 600;
            display: block;
        }

        /* ===== BUTTONS ===== */
        .btn-main {
            margin-top: 50px;
            padding: 14px 40px;
            background: var(--accent-purple);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.9rem;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(155, 137, 179, 0.4);
            transition: 0.3s;
            z-index: 20;
        }

        .btn-main:hover { transform: translateY(-3px); background: #8a78a5; }

        #closeBtn {
            margin-top: 20px;
            background: #eee;
            color: #777;
            display: none;
        }

        .wrapper.open #openBtn { display: none; }
        .wrapper.open #closeBtn { display: block; }

    </style>
</head>
<body>

<div class="wrapper" id="container">
    <div class="envelope">
        <div class="flap"></div>
        <div class="labels">
            From: <b>Natalie</b><br>
            To: <b>Catrina</b>
        </div>
        
        <div class="letter">
            <div class="letter-title">I'm Sorry</div>
            <div class="letter-body" id="typewriter"></div>
            <div class="letter-sig" id="signature"></div>
        </div>

        <div class="front-folds"></div>
    </div>

    <button class="btn-main" id="openBtn" onclick="openLetter()">Open the letter ✉️</button>
    <button class="btn-main" id="closeBtn" onclick="closeLetter()">Close the letter</button>
</div>

<script>
    const mainText = "I'm sorry, babe, for speaking out of anger, and I deeply regret it. I hope you can forgive me, but even if you can't, I need you to know how truly sorry I am.";
    const sigText = "please, bati na tayo? 🥺";
    
    let i = 0;
    let isTyping = false;

    function openLetter() {
        document.getElementById('container').classList.add('open');
        if (!isTyping) {
            isTyping = true;
            setTimeout(startTyping, 1200);
        }
    }

    function startTyping() {
        const bodyEl = document.getElementById("typewriter");
        const sigEl = document.getElementById("signature");

        function type() {
            if (i < mainText.length) {
                bodyEl.innerHTML += mainText.charAt(i);
                i++;
                setTimeout(type, 45);
            } else {
                // Once main text is done, type the purple signature
                sigEl.innerHTML = sigText;
            }
        }
        type();
    }

    function closeLetter() {
        // Simple reload to reset the state smoothly
        location.reload();
    }
</script>

</body>
</html>
