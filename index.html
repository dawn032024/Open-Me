<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Apology</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        .message-box {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 60px 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: fadeIn 1s ease-in-out;
        }

        /* Initial State - Button Only */
        .initial-state {
            text-align: center;
        }

        .initial-state h1 {
            color: #e0e0e0;
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 30px;
            opacity: 0;
            animation: fadeInDown 0.8s ease-out forwards;
        }

        .initial-state p {
            color: #b0b0b0;
            font-size: 0.95rem;
            font-weight: 300;
            margin-bottom: 40px;
            opacity: 0;
            animation: fadeInDown 0.8s ease-out 0.2s forwards;
        }

        /* Message Content - Hidden Initially */
        .message-content {
            display: none;
            opacity: 0;
        }

        .message-content.show {
            display: block;
            animation: fadeIn 0.8s ease-out forwards;
        }

        .header {
            margin-bottom: 30px;
        }

        .header h1 {
            color: #e0e0e0;
            font-size: 3rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 10px;
            animation: fadeInDown 0.8s ease-out forwards;
        }

        .typing-message {
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 40px 0;
        }

        .message-text {
            color: #d0d0d0;
            font-size: 1.1rem;
            line-height: 1.8;
            font-weight: 300;
            letter-spacing: 0.5px;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }

        .message-text.visible {
            opacity: 1;
        }

        .typing-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background-color: #e0e0e0;
            margin-left: 3px;
            animation: blink 1s infinite;
            opacity: 0;
        }

        .typing-cursor.active {
            opacity: 1;
        }

        @keyframes blink {
            0%, 49% {
                opacity: 1;
            }
            50%, 100% {
                opacity: 0;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .button-container {
            margin-top: 40px;
            animation: fadeInUp 1s ease-out 0.4s forwards;
            opacity: 0;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        button {
            background: linear-gradient(135deg, #c084fc 0%, #7c3aed 100%);
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(196, 132, 252, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(196, 132, 252, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .message-box {
                padding: 40px 30px;
            }

            .header h1 {
                font-size: 2.2rem;
            }

            .message-text {
                font-size: 1rem;
            }

            button {
                padding: 12px 30px;
                font-size: 0.95rem;
            }
        }

        @media (max-width: 480px) {
            .message-box {
                padding: 30px 20px;
            }

            .initial-state h1 {
                font-size: 1.8rem;
                letter-spacing: 1px;
            }

            .header h1 {
                font-size: 1.8rem;
                letter-spacing: 1px;
            }

            .header p {
                font-size: 0.9rem;
            }

            .message-text {
                font-size: 0.95rem;
                line-height: 1.6;
            }

            button {
                padding: 11px 25px;
                font-size: 0.9rem;
            }

            .typing-message {
                min-height: 120px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="message-box">
            <!-- Initial State: Just Button -->
            <div class="initial-state" id="initialState">
                <h1>I Need To Say Something</h1>
                <p>I have something important to tell you</p>
                <div class="button-container">
                    <button id="revealBtn">Read What's In My Heart</button>
                </div>
            </div>

            <!-- Message Content: Hidden Until Button Clicked -->
            <div class="message-content" id="messageContent">
                <div class="header">
                    <h1>I'm Sorry</h1>
                </div>

                <div class="typing-message">
                    <span class="message-text" id="messageText"></span>
                    <span class="typing-cursor" id="cursor"></span>
                </div>

                <div class="button-container">
                    <button id="restartBtn">Start Over</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const fullMessage = "I'm sorry, babe, for speaking out of anger, and I deeply regret it. I hope you can forgive me, but even if you can't, I need you to know how truly sorry I am.";
        const messageElement = document.getElementById('messageText');
        const cursorElement = document.getElementById('cursor');
        const revealBtn = document.getElementById('revealBtn');
        const restartBtn = document.getElementById('restartBtn');
        const initialState = document.getElementById('initialState');
        const messageContent = document.getElementById('messageContent');

        let isTyping = false;
        let currentIndex = 0;

        function typeMessage() {
            if (isTyping || currentIndex > 0) return;

            isTyping = true;
            cursorElement.classList.add('active');
            messageElement.classList.add('visible');
            revealBtn.disabled = true;
            restartBtn.disabled = true;

            function type() {
                if (currentIndex < fullMessage.length) {
                    messageElement.textContent += fullMessage[currentIndex];
                    currentIndex++;
                    setTimeout(type, 40); // Typing speed: 40ms per character
                } else {
                    isTyping = false;
                    cursorElement.classList.remove('active');
                    restartBtn.disabled = false;
                }
            }

            type();
        }

        function revealMessage() {
            // Hide initial state
            initialState.style.display = 'none';
            
            // Show message content with animation
            messageContent.classList.add('show');
            
            // Start typing after animation
            setTimeout(typeMessage, 500);
        }

        function restartExperience() {
            // Reset typing
            currentIndex = 0;
            messageElement.textContent = '';
            cursorElement.classList.remove('active');
            messageElement.classList.remove('visible');
            
            // Hide message content
            messageContent.classList.remove('show');
            
            // Show initial state after animation
            setTimeout(() => {
                messageContent.style.display = 'none';
                initialState.style.display = 'block';
            }, 300);
        }

        revealBtn.addEventListener('click', revealMessage);
        restartBtn.addEventListener('click', restartExperience);
    </script>
</body>
</html>
