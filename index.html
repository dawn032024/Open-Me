<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Apology</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        /* ===== ENVELOPE SECTION ===== */
        .envelope-section {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .envelope {
            width: 100%;
            max-width: 400px;
            position: relative;
            perspective: 1000px;
        }

        .envelope-body {
            background: linear-gradient(135deg, #f5f1de 0%, #e8e3d3 100%);
            border: 2px solid #d4cfc0;
            border-radius: 5px;
            padding: 40px 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            position: relative;
            animation: slideIn 0.8s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .envelope-flap {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(135deg, #e8dcc8 0%, #d9cdb5 100%);
            border: 2px solid #d4cfc0;
            border-bottom: none;
            border-radius: 5px 5px 0 0;
            transform-origin: top;
            transform: rotateX(0deg);
            transition: transform 0.8s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .envelope-flap.open {
            transform: rotateX(-160deg);
            transform-style: preserve-3d;
        }

        .envelope-content {
            position: relative;
            z-index: 5;
            padding-top: 20px;
        }

        .from-to {
            text-align: left;
            font-size: 0.95rem;
            color: #333;
            line-height: 2;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .from-to .label {
            color: #666;
            font-weight: 600;
        }

        .from-to .value {
            color: #333;
            font-style: italic;
        }

        .read-button {
            margin-top: 30px;
            animation: fadeInUp 1s ease-out 0.4s forwards;
            opacity: 0;
        }

        button {
            background: linear-gradient(135deg, #c084fc 0%, #7c3aed 100%);
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(196, 132, 252, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(196, 132, 252, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== LETTER SECTION ===== */
        .letter-section {
            display: none;
            opacity: 0;
        }

        .letter-section.show {
            display: block;
            animation: paperFadeIn 0.8s ease-out forwards;
        }

        @keyframes paperFadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .letter {
            background: linear-gradient(135deg, #fefdfb 0%, #f9f7f4 100%);
            border: 2px solid #d4cfc0;
            border-radius: 5px;
            padding: 60px 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .letter::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 0, 0, 0.02) 2px,
                    rgba(0, 0, 0, 0.02) 4px
                );
            pointer-events: none;
            border-radius: 5px;
        }

        .letter-content {
            position: relative;
            z-index: 1;
        }

        .letter-title {
            font-family: 'Brush Script MT', 'Lucida Handwriting', cursive;
            font-size: 2.5rem;
            color: #7c3aed;
            margin-bottom: 30px;
            font-weight: 400;
            letter-spacing: 1px;
        }

        .letter-message {
            font-family: 'Segoe Print', 'Brush Script MT', cursive;
            font-size: 1.2rem;
            line-height: 2;
            color: #333;
            text-align: center;
            margin: 40px 0;
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        .typing-message {
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .message-text {
            color: #333;
            font-family: 'Segoe Print', 'Brush Script MT', cursive;
            font-size: 1.2rem;
            line-height: 2;
            font-weight: 400;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }

        .message-text.visible {
            opacity: 1;
        }

        .typing-cursor {
            display: inline-block;
            width: 2px;
            height: 1.4em;
            background-color: #7c3aed;
            margin-left: 3px;
            animation: blink 1s infinite;
            opacity: 0;
        }

        .typing-cursor.active {
            opacity: 1;
        }

        @keyframes blink {
            0%, 49% {
                opacity: 1;
            }
            50%, 100% {
                opacity: 0;
            }
        }

        .letter-signature {
            font-family: 'Brush Script MT', 'Lucida Handwriting', cursive;
            font-size: 1.5rem;
            color: #7c3aed;
            margin-top: 50px;
            margin-bottom: 20px;
            font-weight: 400;
        }

        .button-container {
            margin-top: 30px;
            animation: fadeInUp 1s ease-out 0.5s forwards;
            opacity: 0;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .envelope-body {
                padding: 30px 20px;
            }

            .letter {
                padding: 40px 25px;
            }

            .letter-title {
                font-size: 2rem;
            }

            .letter-message {
                font-size: 1.1rem;
                line-height: 1.8;
            }

            .letter-signature {
                font-size: 1.3rem;
            }

            button {
                padding: 12px 30px;
                font-size: 0.95rem;
            }
        }

        @media (max-width: 480px) {
            .envelope-body {
                padding: 25px 15px;
            }

            .letter {
                padding: 30px 20px;
            }

            .from-to {
                font-size: 0.9rem;
                line-height: 1.8;
            }

            .letter-title {
                font-size: 1.8rem;
            }

            .letter-message {
                font-size: 1rem;
                line-height: 1.6;
            }

            .letter-signature {
                font-size: 1.2rem;
            }

            button {
                padding: 11px 25px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ===== ENVELOPE SECTION ===== -->
        <div class="envelope-section" id="envelopeSection">
            <div class="envelope">
                <div class="envelope-flap" id="envelopeFlap"></div>
                <div class="envelope-body">
                    <div class="envelope-content">
                        <div class="from-to">
                            <div><span class="label">From:</span> <span class="value">Natalie</span></div>
                            <div><span class="label">To:</span> <span class="value">Catrina</span></div>
                        </div>
                        <div class="read-button">
                            <button id="revealBtn">Read Me</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ===== LETTER SECTION ===== -->
        <div class="letter-section" id="letterSection">
            <div class="letter">
                <div class="letter-content">
                    <div class="letter-title">I'm Sorry</div>

                    <div class="typing-message">
                        <span class="message-text" id="messageText"></span>
                        <span class="typing-cursor" id="cursor"></span>
                    </div>

                    <div class="letter-signature" id="signature"></div>

                    <div class="button-container">
                        <button id="restartBtn">Start Over</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const fullMessage = "I'm sorry, babe, for speaking out of anger, and I deeply regret it. I hope you can forgive me, but even if you can't, I need you to know how truly sorry I am.";
        const signature = "please, bati na tayo?🥺";

        const messageElement = document.getElementById('messageText');
        const cursorElement = document.getElementById('cursor');
        const signatureElement = document.getElementById('signature');
        const revealBtn = document.getElementById('revealBtn');
        const restartBtn = document.getElementById('restartBtn');
        const envelopeSection = document.getElementById('envelopeSection');
        const letterSection = document.getElementById('letterSection');
        const envelopeFlap = document.getElementById('envelopeFlap');

        let isTyping = false;
        let currentIndex = 0;

        function typeMessage() {
            if (isTyping || currentIndex > 0) return;

            isTyping = true;
            cursorElement.classList.add('active');
            messageElement.classList.add('visible');
            revealBtn.disabled = true;
            restartBtn.disabled = true;

            function type() {
                if (currentIndex < fullMessage.length) {
                    messageElement.textContent += fullMessage[currentIndex];
                    currentIndex++;
                    setTimeout(type, 40); // Typing speed: 40ms per character
                } else {
                    isTyping = false;
                    cursorElement.classList.remove('active');
                    signatureElement.textContent = signature;
                    restartBtn.disabled = false;
                }
            }

            type();
        }

        function revealMessage() {
            // Open envelope flap with animation
            envelopeFlap.classList.add('open');
            revealBtn.disabled = true;

            // After envelope opens, show letter
            setTimeout(() => {
                envelopeSection.style.display = 'none';
                letterSection.classList.add('show');

                // Start typing after letter appears
                setTimeout(typeMessage, 500);
            }, 1000);
        }

        function restartExperience() {
            // Reset typing
            currentIndex = 0;
            messageElement.textContent = '';
            signatureElement.textContent = '';
            cursorElement.classList.remove('active');
            messageElement.classList.remove('visible');

            // Hide letter
            letterSection.classList.remove('show');

            // Show envelope after animation
            setTimeout(() => {
                letterSection.style.display = 'none';
                envelopeSection.style.display = 'flex';
                envelopeFlap.classList.remove('open');
                revealBtn.disabled = false;
            }, 300);
        }

        revealBtn.addEventListener('click', revealMessage);
        restartBtn.addEventListener('click', restartExperience);
    </script>
</body>
</html>
